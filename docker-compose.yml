services:
  gsbDb:
    image: mysql
    container_name: "gsbDb"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gsb_frais
      MYSQL_USER: user_gsb
      MYSQL_PASSWORD: password_gsb
    ports:
      - 3307:3306
    networks:
      - app_network
    volumes:
      - db:/var/lib/mysql
      - ./database:/var/lib/bdd

  gsbAdminer:
    image: adminer
    container_name: "gsbAdminer"
    restart: always
    ports:
      - 8080:8080
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db: