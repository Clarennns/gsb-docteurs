services:
  gsbDb:
    image: mysql:8.0
    container_name: gsbDb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gsb_frais
      MYSQL_USER: user_gsb
      MYSQL_PASSWORD: password_gsb
    ports:
      - "3307:3306"
    volumes:
      - db:/var/lib/mysql
      - ./gsb-node-api-samir/database:/docker-entrypoint-initdb.d:ro
    networks:
      - app_network

  gsbAdminer:
    image: adminer:latest
    container_name: gsbAdminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - gsbDb
    networks:
      - app_network

  api:
    build:
      context: ./gsb-node-api-samir
    container_name: gsbApi
    restart: always
    environment:
      NODE_ENV: development
      DB_HOST: gsbDb
      DB_PORT: 3306
      DB_NAME: gsb_frais
      DB_USER: user_gsb
      DB_PASSWORD: password_gsb
    ports:
      - "3000:3000"
    depends_on:
      - gsbDb
    networks:
      - app_network

  web:
    build:
      context: ./GSBDoctor-12-03-2026
    container_name: gsbWeb
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db:
